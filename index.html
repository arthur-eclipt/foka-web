<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Peel Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" />
    <style>
      :root {
        --gold:           #c9a253;
        --gold-bright:    #e6c177;
        --gold-deep:      #8e6a26;
        --burgundy:       #4a0d18;
        --burgundy-back:  #2c0810;
        --bg:             #0a0306;
        --ink:            #f4e4c1;
      }

      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: radial-gradient(ellipse at center, #220a10 0%, var(--bg) 70%);
        font-family: 'Inter', system-ui, sans-serif;
        color: var(--ink);
        display: grid;
        place-items: center;
        touch-action: manipulation;
      }

      .lab {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 40px;
      }
      .lab h1 {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 500;
        font-size: 22px;
        letter-spacing: 0.18em;
        color: rgba(244, 228, 193, 0.55);
        margin: 0;
        text-transform: uppercase;
      }
      .credit {
        font-size: 11px;
        letter-spacing: 0.14em;
        color: rgba(244, 228, 193, 0.32);
        margin: 0;
        text-align: center;
      }
      .credit a {
        color: rgba(244, 228, 193, 0.5);
        text-decoration: none;
        border-bottom: 1px dotted rgba(244, 228, 193, 0.25);
      }
      .hint {
        font-size: 11px;
        letter-spacing: 0.18em;
        color: rgba(244, 228, 193, 0.4);
        margin: -20px 0 0;
        text-transform: uppercase;
      }
      .reset {
        font-family: 'Cormorant Garamond', serif;
        font-size: 14px;
        background: none;
        color: rgba(244, 228, 193, 0.5);
        border: 1px solid rgba(244, 228, 193, 0.2);
        padding: 9px 22px;
        border-radius: 999px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .reset:hover { color: var(--gold); border-color: rgba(201, 162, 83, 0.4); }

      /* ====================================================== */
      /* Peel button — adapted from Patrick Kunka's CodePen     */
      /* https://codepen.io/patrickkunka/pen/axEgL              */
      /*                                                         */
      /* Two clipping windows (.front, .back) live inside        */
      /* rotated wrappers (.sticky). Each window contains the    */
      /* SAME circle at different vertical offsets, so each      */
      /* shows a different slice of the same circle. As the      */
      /* windows resize and the circles shift, the visual is a   */
      /* sticker peeling off — no 3D transforms required.        */
      /*                                                         */
      /* Triggers on :hover (desktop preview) AND when the       */
      /* `.peeling` class is set (click toggle, works on mobile).*/
      /* ====================================================== */

      .anim750 { transition: all 0.75s cubic-bezier(0.55, 0.05, 0.4, 1); }

      #peel {
        position: relative;
        width: 180px;
        height: 180px;
        backface-visibility: hidden;
        cursor: pointer;
      }

      #peel .sticky {
        position: absolute;
        top: 0;
        left: 0;
        width: 180px;
        height: 180px;
        transform: rotate(45deg);
      }

      #peel .circle-wrap {
        position: absolute;
        width: 180px;
        height: 180px;
        left: 0;
        top: 0;
        overflow: hidden;
      }

      #peel .circle {
        position: absolute;
        width: 140px;
        height: 140px;
        margin: 20px;
        border-radius: 999px;
      }

      /* Reveal — the surface beneath the sticker. */
      #peel .reveal .circle {
        background: var(--burgundy-back);
        box-shadow: inset 0 1px 0 rgba(0, 0, 0, 0.5);
        font-family: 'Cormorant Garamond', serif;
        font-weight: 500;
        font-size: 13px;
        letter-spacing: 0.24em;
        line-height: 140px;
        text-align: center;
        color: var(--gold-bright);
        text-shadow: 0 0 14px rgba(201, 162, 83, 0.4);
        text-transform: uppercase;
      }

      /* Back — the peeled-back portion. Thin sliver near the top at
         rest; grows downward on peel. */
      #peel .back {
        height: 10px;
        top: 30px;
      }
      #peel .back .circle {
        margin-top: -130px;
        background-color: var(--gold-deep);
        background-image: linear-gradient(
          to top,
          rgba(201, 162, 83, 0) 0%,
          rgba(255, 240, 200, 0.55) 100%
        );
      }

      /* Front — the visible face of the sticker. */
      #peel .front {
        height: 150px;
        bottom: 0;
        top: auto;
        box-shadow: 0 -140px 20px -140px rgba(0, 0, 0, 0.3);
      }
      #peel .front .circle {
        margin-top: -10px;
        background-color: var(--gold-bright);
        background-image: linear-gradient(
          to top,
          rgba(201, 162, 83, 0) 75%,
          var(--burgundy) 95%
        );
      }

      /* Label that fades during the peel. */
      #peel h4 {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 600;
        font-size: 16px;
        letter-spacing: 0.22em;
        color: #1a0508;
        text-transform: uppercase;
        text-align: center;
        position: absolute;
        width: 180px;
        height: 140px;
        line-height: 140px;
        margin: 20px 0;
        top: 0;
        left: 0;
        z-index: 5;
        pointer-events: none;
        transition: opacity 0.05s linear 0.4s;
      }

      /* PEELED state — fires on hover OR when .peeling is set. */
      #peel:hover .sticky,
      #peel.peeling .sticky {
        transform: rotate(10deg);
      }
      #peel:hover .back,
      #peel.peeling .back {
        height: 90px;
        top: 110px;
      }
      #peel:hover .back .circle,
      #peel.peeling .back .circle {
        margin-top: -50px;
      }
      #peel:hover .front,
      #peel.peeling .front {
        height: 70px;
        box-shadow: 0 -60px 10px -60px rgba(0, 0, 0, 0.1);
      }
      #peel:hover .front .circle,
      #peel.peeling .front .circle {
        margin-top: -90px;
        background-color: var(--gold);
        background-position: 0 100px;
      }
      #peel:hover h4,
      #peel.peeling h4 {
        opacity: 0;
        transition: opacity 0.05s linear 0.3s;
      }
    </style>
  </head>
  <body>
    <main class="lab">
      <h1>Peel Lab</h1>

      <div id="peel" class="anim750">
        <div class="reveal circle-wrap">
          <div class="circle">PEELED</div>
        </div>

        <div class="sticky anim750">
          <div class="front circle-wrap anim750">
            <div class="circle anim750"></div>
          </div>
        </div>

        <h4>PEEL ME</h4>

        <div class="sticky anim750">
          <div class="back circle-wrap anim750">
            <div class="circle anim750"></div>
          </div>
        </div>
      </div>

      <p class="hint">Hover to preview · Click to lock peeled</p>

      <button class="reset" type="button">Reset</button>

      <p class="credit">
        Technique adapted from
        <a href="https://codepen.io/patrickkunka/pen/axEgL" target="_blank" rel="noopener">
          Patrick Kunka
        </a>
      </p>
    </main>

    <script>
      const peel = document.getElementById('peel');
      const reset = document.querySelector('.reset');
      peel.addEventListener('click', () => peel.classList.toggle('peeling'));
      reset.addEventListener('click', () => peel.classList.remove('peeling'));
    </script>
  </body>
</html>
