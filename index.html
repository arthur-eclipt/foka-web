<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Foka</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" />
    <style>
      :root {
        --gold:           #c9a253;
        --gold-bright:    #e6c177;
        --gold-deep:      #8e6a26;
        --burgundy:       #4a0d18;
        --burgundy-back:  #2c0810;
        --burgundy-deep:  #1a040a;
        --bg:             #0a0306;
        --ink:            #f4e4c1;
      }

      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        min-height: 100%;
        background: radial-gradient(ellipse at center, #220a10 0%, var(--bg) 70%);
        font-family: 'Inter', system-ui, sans-serif;
        color: var(--ink);
        display: grid;
        place-items: center;
        touch-action: manipulation;
      }
      body { padding: 40px 16px; }

      .lab {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 36px;
        max-width: 900px;
      }
      .lab h1 {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 500;
        font-size: 22px;
        letter-spacing: 0.18em;
        color: rgba(244, 228, 193, 0.55);
        margin: 0;
        text-transform: uppercase;
      }
      .hint {
        font-size: 11px;
        letter-spacing: 0.18em;
        color: rgba(244, 228, 193, 0.4);
        margin: 0;
        text-transform: uppercase;
      }
      .credit {
        font-size: 11px;
        letter-spacing: 0.14em;
        color: rgba(244, 228, 193, 0.32);
        margin: 0;
      }
      .credit a {
        color: rgba(244, 228, 193, 0.5);
        text-decoration: none;
        border-bottom: 1px dotted rgba(244, 228, 193, 0.25);
      }
      .reset {
        font-family: 'Cormorant Garamond', serif;
        font-size: 14px;
        background: none;
        color: rgba(244, 228, 193, 0.5);
        border: 1px solid rgba(244, 228, 193, 0.2);
        padding: 9px 22px;
        border-radius: 999px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .reset:hover { color: var(--gold); border-color: rgba(201, 162, 83, 0.4); }

      .variants {
        display: flex;
        flex-wrap: wrap;
        gap: 40px 56px;
        justify-content: center;
        align-items: flex-start;
      }
      .variant {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      .variant-tag {
        font-family: 'Cormorant Garamond', serif;
        font-size: 13px;
        letter-spacing: 0.24em;
        color: rgba(244, 228, 193, 0.5);
        text-transform: uppercase;
      }

      /* =====================================================
         Shared peel button shell
         ===================================================== */
      .peel-btn {
        position: relative;
        width: 240px;
        height: 76px;
        border: none;
        background: none;
        padding: 0;
        cursor: pointer;
        font-family: inherit;
        overflow: visible;
      }

      /* Layer 1 — burgundy card with inner shadow, holds PEELED text. */
      .peel-btn .reveal {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(ellipse at 30% 30%, rgba(74, 13, 24, 0.55) 0%, transparent 60%),
          linear-gradient(180deg, var(--burgundy-back) 0%, var(--burgundy-deep) 100%);
        border-radius: 14px;
        box-shadow:
          inset 0 2px 6px rgba(0, 0, 0, 0.7),
          inset 0 0 0 1px rgba(74, 13, 24, 0.55),
          inset 0 -1px 0 rgba(255, 230, 200, 0.04);
        font-family: 'Cormorant Garamond', serif;
        font-weight: 500;
        font-size: 16px;
        letter-spacing: 0.32em;
        color: var(--gold-bright);
        text-shadow: 0 0 14px rgba(201, 162, 83, 0.5);
        text-transform: uppercase;
        z-index: 0;
      }

      /* Shared label style inside the gold sticker. */
      .peel-btn .label {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Cormorant Garamond', serif;
        font-weight: 600;
        font-size: 19px;
        letter-spacing: 0.22em;
        color: #1a0508;
        text-transform: uppercase;
        pointer-events: none;
      }

      /* =====================================================
         Variant A — Slide-off
         The sticker translates diagonally off the card with a
         slight rotation, fading near the end. No fold visible;
         it just lifts and flies away.
         ===================================================== */
      .peel-a .front-a {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold) 100%);
        border-radius: 14px;
        box-shadow:
          0 0 0 1px rgba(201, 162, 83, 0.65),
          0 10px 22px rgba(201, 162, 83, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.3);
        z-index: 2;
        transition:
          transform 0.75s cubic-bezier(0.5, 0.0, 0.3, 1),
          opacity   0.5s ease 0.2s,
          box-shadow 0.75s ease;
        transform-origin: 100% 100%;
      }
      .peel-a:hover .front-a,
      .peel-a.peeling .front-a {
        transform: translate(120%, 70%) rotate(12deg);
        opacity: 0;
        box-shadow:
          0 0 0 1px rgba(201, 162, 83, 0.4),
          0 20px 40px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.3);
      }

      /* =====================================================
         Variant B — Corner curl (3D fold from TL)
         A 3D rotation around the anti-diagonal axis pinned at
         BR corner. The sticker flips backward, briefly shows
         its underside, then continues off-screen.
         ===================================================== */
      .peel-b {
        perspective: 1100px;
      }
      .peel-b .card-3d {
        position: absolute;
        inset: 0;
        transform-style: preserve-3d;
        transform-origin: 100% 100%;
        transition: transform 0.95s cubic-bezier(0.5, 0.0, 0.3, 1);
        z-index: 2;
      }
      .peel-b .front-b,
      .peel-b .back-b {
        position: absolute;
        inset: 0;
        border-radius: 14px;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
      }
      .peel-b .front-b {
        background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold) 100%);
        box-shadow:
          0 0 0 1px rgba(201, 162, 83, 0.65),
          0 10px 22px rgba(201, 162, 83, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.3);
      }
      .peel-b .back-b {
        background:
          linear-gradient(135deg,
            rgba(120, 60, 80, 0.95) 0%,
            rgba(74, 26, 38, 0.95) 50%,
            rgba(50, 16, 26, 0.95) 100%);
        transform: rotateY(180deg);
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.35),
          inset 0 1px 0 rgba(255, 200, 180, 0.06);
      }
      .peel-b:hover .card-3d,
      .peel-b.peeling .card-3d {
        transform: rotate3d(-1, 1, 0, 178deg) translate3d(40%, -25%, 60px);
      }
      .peel-b:hover .label,
      .peel-b.peeling .label {
        opacity: 0;
        transition: opacity 0.2s ease 0.15s;
      }
      .peel-b .label {
        transition: opacity 0.25s ease 0.4s;
      }

      /* =====================================================
         Variant C — Diagonal fold-and-fall
         Phase 1: Patrick Kunka–style fold grows across the
         sticker (TL → BR), exposing the burgundy underside.
         Phase 2: The whole assembly translates off the card.
         ===================================================== */
      .peel-c .stage-c {
        position: absolute;
        inset: 0;
        z-index: 2;
        transition: transform 0.5s cubic-bezier(0.5, 0.0, 0.3, 1) 0.35s,
                    opacity   0.4s ease 0.4s;
      }
      .peel-c .front-c {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold) 100%);
        border-radius: 14px;
        box-shadow:
          0 0 0 1px rgba(201, 162, 83, 0.65),
          0 10px 22px rgba(201, 162, 83, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.3);
        clip-path: polygon(8% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 8%);
        transition: clip-path 0.5s cubic-bezier(0.55, 0.05, 0.4, 1);
      }
      .peel-c .back-c {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          165deg,
          rgba(40, 14, 22, 0.0)  0%,
          rgba(40, 14, 22, 0.0)  10%,
          rgba(58, 20, 30, 0.55) 30%,
          rgba(86, 32, 48, 0.95) 55%,
          rgba(120, 56, 76, 0.95) 80%,
          rgba(160, 90, 110, 0.0) 100%
        );
        border-radius: 14px;
        clip-path: polygon(0% 0%, 8% 0%, 0% 8%, 0% 0%, 0% 0%);
        filter: drop-shadow(2px 3px 6px rgba(0, 0, 0, 0.5));
        transition: clip-path 0.5s cubic-bezier(0.55, 0.05, 0.4, 1);
      }
      .peel-c .label {
        transition: opacity 0.05s linear 0.35s;
      }
      .peel-c:hover .front-c,
      .peel-c.peeling .front-c {
        clip-path: polygon(98% 0%, 100% 0%, 100% 2%, 100% 100%, 0% 100%);
      }
      .peel-c:hover .back-c,
      .peel-c.peeling .back-c {
        clip-path: polygon(0% 0%, 100% 0%, 0% 100%, 0% 0%);
      }
      .peel-c:hover .label,
      .peel-c.peeling .label {
        opacity: 0;
        transition: opacity 0.05s linear 0.2s;
      }
      .peel-c:hover .stage-c,
      .peel-c.peeling .stage-c {
        transform: translate(95%, 95%) rotate(18deg);
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <main class="lab">
      <h1>Peel Lab</h1>

      <div class="variants">
        <div class="variant">
          <span class="variant-tag">A · Slide off</span>
          <button class="peel-btn peel-a" type="button">
            <span class="reveal">PEELED</span>
            <span class="front-a">
              <span class="label">CLICK ME</span>
            </span>
          </button>
        </div>

        <div class="variant">
          <span class="variant-tag">B · Corner curl</span>
          <button class="peel-btn peel-b" type="button">
            <span class="reveal">PEELED</span>
            <span class="card-3d">
              <span class="front-b">
                <span class="label">CLICK ME</span>
              </span>
              <span class="back-b" aria-hidden="true"></span>
            </span>
          </button>
        </div>

        <div class="variant">
          <span class="variant-tag">C · Fold &amp; fall</span>
          <button class="peel-btn peel-c" type="button">
            <span class="reveal">PEELED</span>
            <span class="stage-c">
              <span class="back-c" aria-hidden="true"></span>
              <span class="front-c">
                <span class="label">CLICK ME</span>
              </span>
            </span>
          </button>
        </div>
      </div>

      <p class="hint">Hover to preview · Click to lock peeled</p>

      <button class="reset" type="button">Reset all</button>

      <p class="credit">
        Technique adapted from
        <a href="https://codepen.io/patrickkunka/pen/axEgL" target="_blank" rel="noopener">
          Patrick Kunka
        </a>
      </p>
    </main>

    <script>
      const buttons = document.querySelectorAll('.peel-btn');
      buttons.forEach(btn => {
        btn.addEventListener('click', () => btn.classList.toggle('peeling'));
      });
      document.querySelector('.reset').addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('peeling'));
      });
    </script>
  </body>
</html>
