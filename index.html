<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Peel Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@500;600&display=swap" />
    <style>
      :root {
        --gold:        #c9a253;
        --gold-bright: #e6c177;
        --burgundy:    #4a0d18;
        --burgundy-deep: #2c0810;
        --bg-dark:     #160508;
        --ink:         #f4e4c1;

        /* Knob: where the peel anchors on the sticker. Tweak per iteration.
           Other directions to try: 'br' (bottom-right), 'tl' (top-left). */
        --anchor: 'tr';
      }

      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background:
          radial-gradient(ellipse at center, #220a10 0%, var(--bg-dark) 70%);
        font-family: 'Inter', system-ui, sans-serif;
        color: var(--ink);
        display: grid;
        place-items: center;
        overflow: hidden;
        touch-action: manipulation;
      }

      .lab {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
      }
      .lab h1 {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 500;
        font-size: 20px;
        letter-spacing: 0.08em;
        color: rgba(244, 228, 193, 0.55);
        margin: 0;
        text-transform: uppercase;
      }
      .reset {
        margin-top: 12px;
        font-family: 'Cormorant Garamond', serif;
        font-size: 14px;
        background: none;
        color: rgba(244, 228, 193, 0.55);
        border: 1px solid rgba(244, 228, 193, 0.2);
        padding: 8px 18px;
        border-radius: 999px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .reset:hover {
        color: var(--gold);
        border-color: rgba(201, 162, 83, 0.4);
      }

      /* -------------------------------------------------- */
      /* THE STICKER BUTTON -- this is what we iterate on   */
      /* -------------------------------------------------- */

      .sticker-btn {
        position: relative;
        width: 260px;
        height: 80px;
        border: none;
        background: none;
        padding: 0;
        cursor: pointer;
        font-family: inherit;
        /* perspective lives on the container so 3D transforms inside are real */
        perspective: 700px;
        perspective-origin: 50% 50%;
      }

      /* Underneath layer -- what's revealed after the sticker is peeled off. */
      .sticker-under {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Cormorant Garamond', serif;
        font-weight: 500;
        font-size: 17px;
        letter-spacing: 0.16em;
        color: var(--gold-bright);
        text-shadow: 0 0 12px rgba(201, 162, 83, 0.5);
        text-transform: uppercase;
      }

      /* The sticker label sitting on top -- this is the thing that peels off.
         Single element with a clip-path that animates a diagonal "still
         stuck" region shrinking toward the bottom-left. The peeled-away
         portion is filled in by .sticker-flap below. */
      .sticker-front {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Cormorant Garamond', serif;
        font-weight: 600;
        font-size: 19px;
        letter-spacing: 0.18em;
        color: #1a0508;
        text-transform: uppercase;
        background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold) 100%);
        border-radius: 14px;
        box-shadow:
          0 0 0 1px rgba(201, 162, 83, 0.7),
          0 14px 30px rgba(201, 162, 83, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.3);
        /* The "still stuck" region. At rest this is the full sticker. The
           animation morphs this polygon: it shrinks toward bottom-left while
           losing the top-right corner first. */
        clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%);
      }

      /* The peeled-back flap. It's positioned where the original sticker
         WOULD be, but rendered as the back of the sticker (different color,
         subtle adhesive texture). The flap rotates in 3D so the top-right
         corner appears to lift up and curl backward. */
      .sticker-flap {
        position: absolute;
        inset: 0;
        border-radius: 14px;
        /* Origin is the fold-line anchor: anti-diagonal pivot so the
           top-right corner lifts and the bottom-left stays anchored. */
        transform-origin: 0% 100%;
        transform: rotate3d(1, 1, 0, 0deg);
        /* The "lifted" portion -- starts as a tiny triangle at the top-right,
           grows toward the bottom-left as the peel progresses. */
        clip-path: polygon(100% 0%, 100% 0%, 100% 0%, 100% 0%, 100% 0%);
        background:
          /* dim base coloring -- like the back of a label */
          linear-gradient(135deg,
            rgba(60, 18, 26, 0.97) 0%,
            rgba(38, 12, 18, 0.95) 50%,
            rgba(20, 6, 10, 0.93) 100%),
          /* faint adhesive grid */
          repeating-linear-gradient(45deg,
            rgba(255, 255, 255, 0.018) 0 6px,
            rgba(0, 0, 0, 0.05) 6px 12px);
        background-blend-mode: overlay;
        box-shadow:
          0 0 0 1px rgba(201, 162, 83, 0.25),
          0 8px 22px rgba(0, 0, 0, 0.55);
      }

      /* Trigger: when the button is in .peeling state, both layers animate.
         (Triggered by JS so we can re-run easily.) */
      .sticker-btn.peeling .sticker-front {
        animation: peel-front 1.6s cubic-bezier(0.4, 0.05, 0.4, 1) forwards;
      }
      .sticker-btn.peeling .sticker-flap {
        animation: peel-flap 1.6s cubic-bezier(0.4, 0.05, 0.4, 1) forwards;
      }

      /* The unpeeled portion shrinks from full square to the bottom-left
         corner, sweeping its top-right corner off first. 5-vertex polygons
         so the shape interpolates smoothly through the triangle phase. */
      @keyframes peel-front {
        0% {
          clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%);
        }
        50% {
          /* bottom-left triangle */
          clip-path: polygon(0% 0%, 0% 0%, 100% 100%, 0% 100%, 0% 100%);
        }
        100% {
          /* collapsed to bottom-left point */
          clip-path: polygon(0% 100%, 0% 100%, 0% 100%, 0% 100%, 0% 100%);
        }
      }

      /* The flap covers the peeled (top-right) region, rotating around the
         anti-diagonal so it looks like the corner is curling up and back. */
      @keyframes peel-flap {
        0% {
          /* degenerate triangle at top-right corner (invisible) */
          clip-path: polygon(100% 0%, 100% 0%, 100% 0%, 100% 0%, 100% 0%);
          transform: rotate3d(1, 1, 0, 0deg);
        }
        50% {
          /* top-right triangle has grown to cover half */
          clip-path: polygon(100% 0%, 100% 100%, 100% 100%, 0% 0%, 0% 0%);
          transform: rotate3d(1, 1, 0, 60deg);
        }
        100% {
          /* full square, but rotated 175deg around the anti-diagonal so it
             appears curled fully back -- backface basically out of view. */
          clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%);
          transform: rotate3d(1, 1, 0, 175deg);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="lab">
      <h1>Peel Lab</h1>

      <button class="sticker-btn" type="button" aria-label="Peel">
        <div class="sticker-under">PEELED</div>
        <div class="sticker-front">CLICK TO PEEL</div>
        <div class="sticker-flap" aria-hidden="true"></div>
      </button>

      <button class="reset" type="button">Reset</button>
    </main>

    <script>
      const btn = document.querySelector('.sticker-btn');
      const reset = document.querySelector('.reset');

      btn.addEventListener('click', () => {
        if (btn.classList.contains('peeling')) return;
        btn.classList.add('peeling');
      });

      reset.addEventListener('click', () => {
        btn.classList.remove('peeling');
      });
    </script>
  </body>
</html>
