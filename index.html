<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Peel Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" />
    <style>
      :root {
        --gold:           #c9a253;
        --gold-bright:    #e6c177;
        --gold-deep:      #8e6a26;
        --burgundy:       #4a0d18;
        --burgundy-back:  #2c0810;
        --bg:             #0a0306;
        --ink:            #f4e4c1;
      }

      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: radial-gradient(ellipse at center, #220a10 0%, var(--bg) 70%);
        font-family: 'Inter', system-ui, sans-serif;
        color: var(--ink);
        display: grid;
        place-items: center;
        touch-action: manipulation;
      }

      .lab {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 40px;
      }
      .lab h1 {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 500;
        font-size: 22px;
        letter-spacing: 0.18em;
        color: rgba(244, 228, 193, 0.55);
        margin: 0;
        text-transform: uppercase;
      }
      .hint {
        font-size: 11px;
        letter-spacing: 0.18em;
        color: rgba(244, 228, 193, 0.4);
        margin: -20px 0 0;
        text-transform: uppercase;
      }
      .credit {
        font-size: 11px;
        letter-spacing: 0.14em;
        color: rgba(244, 228, 193, 0.32);
        margin: 0;
      }
      .credit a {
        color: rgba(244, 228, 193, 0.5);
        text-decoration: none;
        border-bottom: 1px dotted rgba(244, 228, 193, 0.25);
      }
      .reset {
        font-family: 'Cormorant Garamond', serif;
        font-size: 14px;
        background: none;
        color: rgba(244, 228, 193, 0.5);
        border: 1px solid rgba(244, 228, 193, 0.2);
        padding: 9px 22px;
        border-radius: 999px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .reset:hover { color: var(--gold); border-color: rgba(201, 162, 83, 0.4); }

      /* ========================================================== */
      /* Rectangular peel button                                     */
      /*                                                              */
      /* Same three-layer idea as Patrick Kunka's CodePen but the    */
      /* 45° rotation trick is dropped (rectangles can't rotate      */
      /* invisibly). The diagonal fold is built into clip-paths.    */
      /*                                                              */
      /*   layer 1 .reveal  PEELED text, full rectangle              */
      /*   layer 2 .front   gold sticker, clip-path morphs from      */
      /*                    "full minus tiny TL corner" to "small    */
      /*                    BR triangle". The label sits inside so   */
      /*                    it peels with the sticker.                */
      /*   layer 3 .back    back-of-sticker. Gradient is transparent */
      /*                    at the TL corner and opaque toward the   */
      /*                    fold edge — so PEELED reads near the     */
      /*                    corner while the burgundy "back" reads   */
      /*                    along the fold.                           */
      /* ========================================================== */

      .peel-btn {
        position: relative;
        width: 260px;
        height: 80px;
        border: none;
        background: none;
        padding: 0;
        cursor: pointer;
        font-family: inherit;
      }

      /* Layer 1 — what's revealed beneath the sticker. */
      .peel-btn .reveal {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--burgundy-back);
        border-radius: 14px;
        box-shadow: inset 0 1px 0 rgba(0, 0, 0, 0.45);
        font-family: 'Cormorant Garamond', serif;
        font-weight: 500;
        font-size: 14px;
        letter-spacing: 0.26em;
        color: var(--gold-bright);
        text-shadow: 0 0 14px rgba(201, 162, 83, 0.45);
        text-transform: uppercase;
        z-index: 1;
      }

      /* Layer 2 — the gold sticker face. */
      .peel-btn .front {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold) 100%);
        border-radius: 14px;
        box-shadow:
          0 0 0 1px rgba(201, 162, 83, 0.65),
          0 10px 22px rgba(201, 162, 83, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.3);
        /* Initial: full rectangle MINUS a small TL corner so the .back
           flap shows through (the "this is peelable" visual cue). */
        clip-path: polygon(8% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 8%);
        z-index: 2;
        transition: clip-path 0.75s cubic-bezier(0.55, 0.05, 0.4, 1);
      }

      /* Label rides inside .front so it peels with the sticker. */
      .peel-btn .front .label {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Cormorant Garamond', serif;
        font-weight: 600;
        font-size: 19px;
        letter-spacing: 0.22em;
        color: #1a0508;
        text-transform: uppercase;
        pointer-events: none;
        transition: opacity 0.05s linear 0.4s;
      }

      /* Layer 3 — back of sticker. Gradient is transparent toward the
         TL corner (so PEELED shows through there) and opaque toward
         the fold edge (so the back-of-sticker reads near the fold).
         Gradient angle ~165deg roughly aligns with the BR-direction
         given the 260:80 aspect ratio. */
      .peel-btn .back {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          165deg,
          rgba(40, 14, 22, 0.0)  0%,
          rgba(40, 14, 22, 0.0)  20%,
          rgba(58, 20, 30, 0.45) 38%,
          rgba(74, 26, 38, 0.88) 55%,
          rgba(96, 38, 52, 0.95) 72%,
          rgba(132, 60, 82, 0.85) 90%,
          rgba(160, 90, 110, 0.0) 100%
        );
        border-radius: 14px;
        /* Initial: tiny TL flap (mirrors the .front's TL cut). */
        clip-path: polygon(0% 0%, 8% 0%, 0% 8%, 0% 0%, 0% 0%);
        filter: drop-shadow(2px 3px 5px rgba(0, 0, 0, 0.45));
        z-index: 3;
        transition: clip-path 0.75s cubic-bezier(0.55, 0.05, 0.4, 1);
      }

      /* PEELED state — fires on hover OR when .peeling is set. */
      .peel-btn:hover .front,
      .peel-btn.peeling .front {
        /* Most of the sticker is gone; small BR pentagon remains. */
        clip-path: polygon(80% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 80%);
      }
      .peel-btn:hover .label,
      .peel-btn.peeling .label {
        opacity: 0;
        transition: opacity 0.05s linear 0.3s;
      }
      .peel-btn:hover .back,
      .peel-btn.peeling .back {
        /* Lifted region grows from a flap to a large TL triangle. */
        clip-path: polygon(0% 0%, 80% 0%, 0% 80%, 0% 0%, 0% 0%);
      }
    </style>
  </head>
  <body>
    <main class="lab">
      <h1>Peel Lab</h1>

      <button class="peel-btn" type="button">
        <span class="reveal">PEELED</span>
        <span class="front">
          <span class="label">CLICK ME</span>
        </span>
        <span class="back" aria-hidden="true"></span>
      </button>

      <p class="hint">Hover to preview · Click to lock peeled</p>

      <button class="reset" type="button">Reset</button>

      <p class="credit">
        Technique adapted from
        <a href="https://codepen.io/patrickkunka/pen/axEgL" target="_blank" rel="noopener">
          Patrick Kunka
        </a>
      </p>
    </main>

    <script>
      const btn = document.querySelector('.peel-btn');
      const reset = document.querySelector('.reset');
      btn.addEventListener('click', () => btn.classList.toggle('peeling'));
      reset.addEventListener('click', () => btn.classList.remove('peeling'));
    </script>
  </body>
</html>
