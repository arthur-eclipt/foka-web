<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Foka</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" />
    <style>
      :root {
        --gold:           #c9a253;
        --gold-bright:    #e6c177;
        --gold-deep:      #8e6a26;
        --burgundy:       #4a0d18;
        --burgundy-back:  #2c0810;
        --bg:             #0a0306;
        --ink:            #f4e4c1;
      }

      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        min-height: 100%;
        background: radial-gradient(ellipse at center, #220a10 0%, var(--bg) 70%);
        font-family: 'Inter', system-ui, sans-serif;
        color: var(--ink);
        touch-action: manipulation;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }

      .lab {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
      }
      .lab h1 {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 500;
        font-size: 22px;
        letter-spacing: 0.18em;
        color: rgba(244, 228, 193, 0.55);
        margin: 0 0 4px;
        text-transform: uppercase;
      }
      .hint {
        font-size: 11px;
        letter-spacing: 0.18em;
        color: rgba(244, 228, 193, 0.4);
        margin: 4px 0 0;
        text-transform: uppercase;
        text-align: center;
      }
      .credit {
        font-size: 11px;
        letter-spacing: 0.14em;
        color: rgba(244, 228, 193, 0.32);
        margin: 0;
        text-align: center;
      }
      .credit a {
        color: rgba(244, 228, 193, 0.5);
        text-decoration: none;
        border-bottom: 1px dotted rgba(244, 228, 193, 0.25);
      }
      .reset {
        font-family: 'Cormorant Garamond', serif;
        font-size: 14px;
        background: none;
        color: rgba(244, 228, 193, 0.5);
        border: 1px solid rgba(244, 228, 193, 0.2);
        padding: 9px 22px;
        border-radius: 999px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .reset:hover { color: var(--gold); border-color: rgba(201, 162, 83, 0.4); }

      .variant {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      .variant-label {
        font-size: 10px;
        letter-spacing: 0.28em;
        color: rgba(244, 228, 193, 0.4);
        text-transform: uppercase;
      }

      /* ========================================================== */
      /* Shared peel-btn base                                          */
      /*                                                              */
      /*   layer 1 .reveal  PEELED text — sits underneath              */
      /*   layer 2 .front   gold sticker face (label rides inside)    */
      /*   layer 3 .back    underside of sticker, variant-specific    */
      /*                                                              */
      /* Each variant defines its own peeled-state clip-paths and    */
      /* underside gradient. All variants start with full rectangle  */
      /* minus a tiny TL corner as a visual "peelable" cue.          */
      /* ========================================================== */

      .peel-btn {
        position: relative;
        width: 260px;
        height: 80px;
        border: none;
        background: none;
        padding: 0;
        cursor: pointer;
        font-family: inherit;
      }

      .peel-btn .reveal {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--burgundy-back);
        border-radius: 14px;
        box-shadow:
          inset 0 1px 0 rgba(0, 0, 0, 0.5),
          inset 0 0 28px rgba(0, 0, 0, 0.55);
        font-family: 'Cormorant Garamond', serif;
        font-weight: 500;
        font-size: 15px;
        letter-spacing: 0.32em;
        color: var(--gold-bright);
        text-shadow: 0 0 16px rgba(201, 162, 83, 0.6);
        text-transform: uppercase;
        z-index: 1;
      }

      .peel-btn .front {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold) 100%);
        border-radius: 14px;
        box-shadow:
          0 0 0 1px rgba(201, 162, 83, 0.65),
          0 10px 22px rgba(201, 162, 83, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.3);
        clip-path: polygon(8% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 8%);
        z-index: 2;
      }
      .peel-btn .front .label {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Cormorant Garamond', serif;
        font-weight: 600;
        font-size: 19px;
        letter-spacing: 0.22em;
        color: #1a0508;
        text-transform: uppercase;
        pointer-events: none;
        transition: opacity 0.08s linear 0.45s;
      }

      .peel-btn .back {
        position: absolute;
        inset: 0;
        border-radius: 14px;
        clip-path: polygon(0% 0%, 8% 0%, 0% 8%, 0% 0%, 0% 0%);
        filter: drop-shadow(2px 3px 5px rgba(0, 0, 0, 0.5));
        z-index: 3;
      }

      .peel-btn:hover .label,
      .peel-btn.peeling .label {
        opacity: 0;
        transition: opacity 0.08s linear 0.25s;
      }

      /* ========================================================== */
      /* Variant A — Paper backing                                   */
      /* Sticker peels diagonally and lifts away. Underside reads as */
      /* warm cream paper (like a sticker's release liner).          */
      /* ========================================================== */
      .peel-btn.peel-a .back {
        background: linear-gradient(
          155deg,
          rgba(232, 216, 184, 0)    0%,
          rgba(232, 216, 184, 0)    18%,
          rgba(232, 216, 184, 0.78) 36%,
          rgba(214, 194, 154, 0.92) 55%,
          rgba(180, 154, 104, 0.82) 76%,
          rgba(140, 110, 66, 0)     100%
        );
        transition: clip-path 0.75s cubic-bezier(0.55, 0.05, 0.4, 1),
                    opacity 0.3s ease;
      }
      .peel-btn.peel-a .front {
        transition: clip-path 0.75s cubic-bezier(0.55, 0.05, 0.4, 1);
      }
      .peel-btn.peel-a:hover .front,
      .peel-btn.peel-a.peeling .front {
        /* Diagonal cut overshoots to (200%, 0%)→(0%, 200%) — the cut
           line x+y=200% only touches the rect at the BR corner, so
           the visible area shrinks continuously to zero. No residual,
           no opacity hack, peel is gentle all the way through. */
        clip-path: polygon(200% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 200%);
      }
      .peel-btn.peel-a:hover .back,
      .peel-btn.peel-a.peeling .back {
        /* Back's outer edge tracks the front's so they meet at the
           fold line throughout the animation. Opacity fades at the
           tail so the PEELED text reads cleanly once the peel ends. */
        clip-path: polygon(0% 0%, 200% 0%, 0% 200%, 0% 0%, 0% 0%);
        opacity: 0;
        transition: clip-path 0.75s cubic-bezier(0.55, 0.05, 0.4, 1),
                    opacity 0.3s ease 0.5s;
      }

      /* ========================================================== */
      /* Variant B — Burgundy underside                              */
      /* Same peel motion as A but underside is deep burgundy, so   */
      /* the sticker appears to peel into the page itself.           */
      /* ========================================================== */
      .peel-btn.peel-b .back {
        background: linear-gradient(
          165deg,
          rgba(40, 14, 22, 0)    0%,
          rgba(40, 14, 22, 0)    18%,
          rgba(58, 20, 30, 0.55) 36%,
          rgba(82, 30, 44, 0.9)  55%,
          rgba(110, 48, 68, 0.85) 75%,
          rgba(150, 80, 100, 0)  100%
        );
        transition: clip-path 0.75s cubic-bezier(0.55, 0.05, 0.4, 1),
                    opacity 0.3s ease;
      }
      .peel-btn.peel-b .front {
        transition: clip-path 0.7s cubic-bezier(0.55, 0.05, 0.4, 1),
                    opacity 0.3s ease;
      }
      .peel-btn.peel-b:hover .front,
      .peel-btn.peel-b.peeling .front {
        clip-path: polygon(100% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 100%);
        opacity: 0;
        transition: clip-path 0.7s cubic-bezier(0.55, 0.05, 0.4, 1),
                    opacity 0.3s ease 0.5s;
      }
      .peel-btn.peel-b:hover .back,
      .peel-btn.peel-b.peeling .back {
        clip-path: polygon(0% 0%, 100% 0%, 0% 100%, 0% 0%, 0% 0%);
        opacity: 0;
        transition: clip-path 0.75s cubic-bezier(0.55, 0.05, 0.4, 1),
                    opacity 0.3s ease 0.5s;
      }

      /* ========================================================== */
      /* Variant C — Lift & rotate off                               */
      /* Sticker peels lightly, then the whole thing translates +   */
      /* rotates + fades away — like being picked off with tweezers.*/
      /* ========================================================== */
      .peel-btn.peel-c .back {
        background: linear-gradient(
          155deg,
          rgba(232, 216, 184, 0)    0%,
          rgba(232, 216, 184, 0)    22%,
          rgba(218, 200, 162, 0.88) 48%,
          rgba(186, 158, 108, 0.55) 85%,
          rgba(140, 110, 66, 0)     100%
        );
      }
      .peel-btn.peel-c .front,
      .peel-btn.peel-c .back {
        transform-origin: 100% 100%;
        transition: transform 0.85s cubic-bezier(0.5, 0.05, 0.3, 1),
                    clip-path 0.6s cubic-bezier(0.5, 0.05, 0.3, 1),
                    opacity 0.45s ease 0.4s;
      }
      .peel-btn.peel-c:hover .front,
      .peel-btn.peel-c.peeling .front {
        clip-path: polygon(55% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 55%);
        transform: translate(48%, 75%) rotate(-20deg);
        opacity: 0;
      }
      .peel-btn.peel-c:hover .back,
      .peel-btn.peel-c.peeling .back {
        clip-path: polygon(0% 0%, 55% 0%, 0% 55%, 0% 0%, 0% 0%);
        transform: translate(48%, 75%) rotate(-20deg);
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <main class="lab">
      <h1>Peel Lab</h1>

      <div class="variant">
        <span class="variant-label">A &middot; Paper backing</span>
        <button class="peel-btn peel-a" type="button">
          <span class="reveal">PEELED</span>
          <span class="front">
            <span class="label">CLICK ME</span>
          </span>
          <span class="back" aria-hidden="true"></span>
        </button>
      </div>

      <div class="variant">
        <span class="variant-label">B &middot; Burgundy underside</span>
        <button class="peel-btn peel-b" type="button">
          <span class="reveal">PEELED</span>
          <span class="front">
            <span class="label">CLICK ME</span>
          </span>
          <span class="back" aria-hidden="true"></span>
        </button>
      </div>

      <div class="variant">
        <span class="variant-label">C &middot; Lift &amp; rotate off</span>
        <button class="peel-btn peel-c" type="button">
          <span class="reveal">PEELED</span>
          <span class="front">
            <span class="label">CLICK ME</span>
          </span>
          <span class="back" aria-hidden="true"></span>
        </button>
      </div>

      <p class="hint">Hover to preview &middot; Click to lock peeled</p>

      <button class="reset" type="button">Reset all</button>

      <p class="credit">
        Technique adapted from
        <a href="https://codepen.io/patrickkunka/pen/axEgL" target="_blank" rel="noopener">
          Patrick Kunka
        </a>
      </p>
    </main>

    <script>
      document.querySelectorAll('.peel-btn').forEach(btn => {
        btn.addEventListener('click', () => btn.classList.toggle('peeling'));
      });
      document.querySelector('.reset').addEventListener('click', () => {
        document.querySelectorAll('.peel-btn').forEach(btn => btn.classList.remove('peeling'));
      });
    </script>
  </body>
</html>
